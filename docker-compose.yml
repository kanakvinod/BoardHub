version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: capstone
      POSTGRES_PASSWORD: capstone
      POSTGRES_DB: capstone_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capstone -d capstone_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://capstone:capstone@db:5432/capstone_db?schema=public
      - JWT_ACCESS_SECRET=super_secret_jwt_access_token_key_1234567890
      - JWT_REFRESH_SECRET=super_secret_jwt_refresh_token_key_0987654321
      - CLIENT_ORIGIN=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    # Automatically synchronize DB schema and run the seed script on container startup
    command: sh -c "npx prisma db push --accept-data-loss && npx prisma db seed && node dist/server.js"

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://localhost:4000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
